services:
  db:
    image: postgres:17
    container_name: groceries-postgres-container
    env_file:
      - .env.dev
    ports:
      - 5432:5432
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    restart: always
    networks:
      - groceries-dev-app

networks:
  groceries-dev-app:
volumes:
  postgres-dev-data:
